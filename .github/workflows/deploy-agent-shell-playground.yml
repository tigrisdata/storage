name: Deploy agent-shell playground

# Manual deploy of apps/agent-shell-playground to Fly.io. The Dockerfile
# (pierrezemb/gostatic) serves the Vite `dist/` produced in the build step,
# so we build in CI first, then `flyctl deploy` ships the static bundle.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds @tigrisdata/agent-shell (workspace dep) then the playground.
      - name: Build playground
        run: pnpm --filter agent-shell-playground... build

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: apps/agent-shell-playground
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy
